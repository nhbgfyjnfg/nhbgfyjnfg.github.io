    // ======================= 余弦相似度函数 (纯JS实现，无numpy依赖) =======================
    function cosSimilarity(x, y, eps = 1e-8) {
        // 计算两个一维数组的余弦相似度
        let dot = 0, normX = 0, normY = 0;
        for (let i = 0; i < x.length; i++) {
            dot += x[i] * y[i];
            normX += x[i] * x[i];
            normY += y[i] * y[i];
        }
        normX = Math.sqrt(normX + eps);
        normY = Math.sqrt(normY + eps);
        return dot / (normX * normY);
    }

    // ========================= 增强版特征提取 + 余弦相似度匹配 =========================
    class DeepStyleNN {
        constructor() {
            // 保留原特征权重（仅用于展示，实际相似度计算已改用余弦相似度）
            this.dimWeights = {
                lyricism: 0.22, sharpness: 0.18, warmth: 0.16,
                narrative: 0.13, abstraction: 0.12, simplicity: 0.10, tension: 0.09
            };
            this.stopWordsSet = new Set(["的","了","是","在","有","和","就","都","而","及","与","也","还","则","但","却","可","若","如","因","为","所以","如果","虽然","尽管","不过","其实","只是","一定","非常","特别","比较","稍微","几乎","大约","大概","也许","可能","应该","可以","能够","会","要","想","做","去","来","走","看","听","说","吃","喝","玩","乐","买","卖","用","拿","放","找","给","送","收","离","留","进","出","上","下","左","右","前","后","里","外","中","间","旁","边","面","底","顶","头","尾","始","终","先","后","多","少","大","小","高","低","长","短","宽","窄","厚","薄","快","慢","好","坏","美","丑","真","假","对","错"]);
        }
    
        extractFeatures(text) {
            let sentences = text.split(/[。！？；]/).filter(s=>s.trim().length>0);
            let wordsRaw = text.replace(/[^\u4e00-\u9fa5]/g, ' ').split(/\s+/).filter(w=>w.length>1 && !this.stopWordsSet.has(w));
            let wordCount = wordsRaw.length;
            let avgSentLen = sentences.length ? text.length/sentences.length : 0;
            
            const lyricDict = ["月光","诗意","黄昏","星辰","梦","温柔","宁静","花开","落叶","远方","相思","醉","清冷","雨巷","笛声","烟雨","水墨","琉璃","薄雾","晚风","晨曦","落霞","琴声","飘渺"];
            const sharpDict = ["批判","荒谬","麻木","讽刺","虚伪","黑暗","丑陋","血","愤怒","冷酷","反抗","觉醒","枷锁","压抑","荒诞","异化","冷眼","匕首","投枪","吃人"];
            const warmDict = ["治愈","温暖","烟火","细碎","日常","柔软","善意","美好","陪伴","拥抱","安宁","幸福","甜","温存","抚慰","融融","炊烟","家常"];
            const abstractDict = ["宇宙","存在","虚无","时间","哲学","意义","命运","永恒","荒诞","意识","悖论","无限","轮回","维度","熵","绝对","超验","形而上学"];
            const simpleDict = ["朴实","土地","庄稼","乡间","老屋","粗茶淡饭","平凡","实在","老实","黄土地","麦田","农人","质朴","憨厚","乡土"];
            const tensionDict = ["悬念","诡异","杀","秘密","危险","恐惧","颤抖","逃亡","迷雾","死亡","阴影","暗流","惊悚","深渊","窒息","扭曲","尸","血泊"];
    
            let lyricCount=0, sharpCount=0, warmCount=0, abstractCount=0, simpleCount=0, tensionCount=0;
            wordsRaw.forEach(w => {
                if(lyricDict.some(k=>w.includes(k))) lyricCount++;
                if(sharpDict.some(k=>w.includes(k))) sharpCount++;
                if(warmDict.some(k=>w.includes(k))) warmCount++;
                if(abstractDict.some(k=>w.includes(k))) abstractCount++;
                if(simpleDict.some(k=>w.includes(k))) simpleCount++;
                if(tensionDict.some(k=>w.includes(k))) tensionCount++;
            });
            
            let puncEmotion = (text.match(/[！？…～]/g)||[]).length / Math.max(text.length,1);
            let narrative = Math.min(1, (sentences.length/10) * (avgSentLen>28?0.9:1.1));
            let norm = Math.max(1, wordCount/14);
            let lyricism = Math.min(1, lyricCount/norm + puncEmotion*0.15);
            let sharpness = Math.min(1, sharpCount/norm);
            let warmth = Math.min(1, warmCount/norm);
            let abstraction = Math.min(1, abstractCount/norm);
            let simplicity = Math.min(1, simpleCount/norm);
            let tension = Math.min(1, tensionCount/norm + (text.match(/[?？!！]/g)||[]).length*0.02);
            
            return { lyricism, sharpness, warmth, abstraction, simplicity, tension, narrative, wordCount, avgSentLen };
        }
        
        // ★★★ 关键修改：使用余弦相似度计算用户特征向量与作家特征向量的匹配度 ★★★
        similarity(userVec, writerVec) {
            // 将七个维度的值提取为数组
            const dims = ['lyricism','sharpness','warmth','abstraction','simplicity','tension','narrative'];
            const userArray = dims.map(d => userVec[d] || 0);
            const writerArray = dims.map(d => writerVec[d] || 0);
            
            // 计算余弦相似度 (范围 -1 ~ 1，通常为正)
            let cosSim = cosSimilarity(userArray, writerArray);
            // 将余弦相似度从 [-1,1] 映射到 [0,100] (负值取0)
            let rawScore = Math.max(0, cosSim) * 100;
            
            // 文本长度加成（保持与原逻辑一致）
            let lengthBoost = Math.min(1.18, 0.85 + userVec.wordCount / 200);
            let finalScore = Math.min(99, Math.floor(rawScore * lengthBoost));
            return finalScore;
        }
        
        analyze(text, writerDB) {
            let userFeat = this.extractFeatures(text);
            let bestMatch = null, bestScore = -1;
            for(let w of writerDB) {
                let score = this.similarity(userFeat, w.styleVector);
                if(score > bestScore) {
                    bestScore = score;
                    bestMatch = w;
                }
            }
            // 过短文本轻微降权
            if(text.length < 45) bestScore = Math.max(38, bestScore * 0.78);
            return { writer: bestMatch, score: Math.min(99, bestScore), userVector: userFeat };
        }
    }

    // 初始化分析引擎
    const styleNN = new DeepStyleNN();
    
    // ----- 动态粒子背景 (优雅的星空粒子动画) -----
    const canvasPart = document.getElementById('particle-canvas');
    let ctxPart = canvasPart.getContext('2d');
    let particles = [];
    function resizeCanvas() { canvasPart.width = window.innerWidth; canvasPart.height = window.innerHeight; }
    function initParticles() {
        particles = [];
        for(let i=0;i<100;i++) {
            particles.push({x:Math.random()*canvasPart.width, y:Math.random()*canvasPart.height, radius:Math.random()*3+1.2, alpha:Math.random()*0.5, vx:(Math.random()-0.5)*0.4, vy:(Math.random()-0.5)*0.25});
        }
    }
    function drawParticles() {
        if(!ctxPart) return;
        ctxPart.clearRect(0,0,canvasPart.width,canvasPart.height);
        for(let p of particles) {
            ctxPart.beginPath();
            ctxPart.arc(p.x, p.y, p.radius, 0, Math.PI*2);
            ctxPart.fillStyle = `rgba(145, 105, 250, ${p.alpha*0.55})`;
            ctxPart.fill();
            p.x += p.vx; p.y += p.vy;
            if(p.x<0) p.x=canvasPart.width; if(p.x>canvasPart.width) p.x=0;
            if(p.y<0) p.y=canvasPart.height; if(p.y>canvasPart.height) p.y=0;
        }
        requestAnimationFrame(drawParticles);
    }
    window.addEventListener('resize', ()=>{resizeCanvas(); initParticles();});
    resizeCanvas(); initParticles(); drawParticles();
    
    // ----- 雷达图绘制函数: 将用户特征与作家特征可视化对比 -----
    function drawRadar(userVec, writerVec) {
        const radarCanvas = document.getElementById('radarCanvas');
        if(!radarCanvas) return;
        const ctx = radarCanvas.getContext('2d');
        const w = radarCanvas.width = 280, h = radarCanvas.height = 280;
        ctx.clearRect(0,0,w,h);
        let dims = ['lyricism','sharpness','warmth','abstraction','simplicity','tension','narrative'];
        let angles = [];
        let count = dims.length;
        for(let i=0;i<count;i++) angles.push(i * Math.PI*2 / count - Math.PI/2);
        let centerX = w/2, centerY = h/2, radius = 105;
        // 绘制背景网格 (4层)
        for(let level=1; level<=4; level++) {
            ctx.beginPath();
            let r = radius * level/4;
            for(let i=0;i<count;i++) {
                let x = centerX + r * Math.cos(angles[i]);
                let y = centerY + r * Math.sin(angles[i]);
                if(i===0) ctx.moveTo(x,y);
                else ctx.lineTo(x,y);
            }
            ctx.closePath();
            ctx.strokeStyle = "#5f5f9e";
            ctx.stroke();
        }
        // 径向线
        for(let i=0;i<count;i++) {
            let x2 = centerX + radius * Math.cos(angles[i]);
            let y2 = centerY + radius * Math.sin(angles[i]);
            ctx.beginPath(); ctx.moveTo(centerX,centerY); ctx.lineTo(x2,y2); ctx.strokeStyle = "#4a4a7a"; ctx.stroke();
        }
        function drawPolygon(vector, color, isFill=true) {
            ctx.beginPath();
            for(let i=0;i<count;i++) {
                let val = vector[dims[i]] || 0;
                let r2 = radius * Math.min(1, val);
                let x = centerX + r2 * Math.cos(angles[i]);
                let y = centerY + r2 * Math.sin(angles[i]);
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            }
            ctx.closePath();
            if(isFill) { ctx.fillStyle = color; ctx.fill(); }
            ctx.strokeStyle = "#fff"; ctx.stroke();
        }
        drawPolygon(userVec, "rgba(99, 102, 241, 0.5)", true);
        drawPolygon(writerVec, "rgba(192, 132, 252, 0.65)", true);
        ctx.font = "10px monospace"; ctx.fillStyle = "#bbb";
        for(let i=0;i<count;i++) {
            let x = centerX + (radius+14) * Math.cos(angles[i]);
            let y = centerY + (radius+8) * Math.sin(angles[i]);
            let label = dims[i].slice(0,3);
            ctx.fillText(label, x-8, y);
        }
    }
    
    let currentResult = null;
    const analyzeBtn = document.getElementById('analyzeBtn');
    const loadingDiv = document.getElementById('loadingPanel');
    const resultDiv = document.getElementById('resultArea');
    const progressBar = document.getElementById('nnProgressBar');
    const stageSpan = document.getElementById('loadingStage');
    
    analyzeBtn.addEventListener('click', ()=>{
        let text = document.getElementById('inputText').value.trim();
        if(!text) { alert("✍️ 写下你的文字，让余弦相似度引擎洞悉你的文风灵魂"); return; }
        loadingDiv.style.display = "block";
        resultDiv.style.display = "none";
        let progress = 0;
        let interval = setInterval(()=>{
            progress += Math.random()*18;
            if(progress>=100) { progress=100; clearInterval(interval); }
            progressBar.style.width = progress+"%";
            if(progress>35) stageSpan.innerText = "特征向量提取 · 余弦相似度计算";
            if(progress>70) stageSpan.innerText = "生成文风拓扑图谱 ✨";
        }, 120);
        setTimeout(()=>{
            clearInterval(interval);
            progressBar.style.width = "100%";
            let res = styleNN.analyze(text, writerDatabase);
            currentResult = res;
            document.getElementById('writerName').innerText = res.writer.name;
            document.getElementById('writerIntro').innerText = res.writer.intro;
            document.getElementById('writerTags').innerHTML = res.writer.tags.map(t=>`<span class="tag">${t}</span>`).join('');
            document.getElementById('writerDesc').innerText = res.writer.desc;
            document.getElementById('matchScoreBadge').innerHTML = `🔥 匹配度 ${res.score}%`;
            drawRadar(res.userVector, res.writer.styleVector);
            loadingDiv.style.display = "none";
            resultDiv.style.display = "block";
        }, 880);
    });
    
    document.getElementById('saveCardBtn').addEventListener('click', ()=>{
        if(!currentResult) return alert("请先分析一段文字");
        let name = currentResult.writer.name;
        let intro = currentResult.writer.intro;
        let desc = currentResult.writer.desc;
        let score = currentResult.score;
        let canvasCard = document.createElement('canvas');
        canvasCard.width = 700; canvasCard.height = 620;
        let ctx = canvasCard.getContext('2d');
        ctx.fillStyle = "#0b0b14"; ctx.fillRect(0,0,700,620);
        ctx.strokeStyle = "#a78bfa"; ctx.lineWidth=3; ctx.strokeRect(15,15,670,590);
        ctx.font = "bold 34px 'PingFang SC'"; ctx.fillStyle = "#e0d4ff"; ctx.fillText("⚡灵魂写手鉴定⚡", 40, 80);
        ctx.font = "28px bold"; ctx.fillStyle = "#c4b5fd"; ctx.fillText(name, 40, 160);
        ctx.font = "16px"; ctx.fillStyle = "#bbb"; ctx.fillText(intro.substring(0, 45), 40, 210);
        ctx.font = "bold 20px"; ctx.fillStyle = "#a78bfa"; ctx.fillText(`匹配度 ${score}%`, 520, 160);
        ctx.font = "15px"; ctx.fillStyle = "#cdd0ff"; 
        let wrapped = desc.match(/.{1,40}/g) || [desc];
        for(let i=0;i<wrapped.length && i<7;i++) ctx.fillText(wrapped[i], 40, 280+i*36);
        ctx.font = "12px monospace"; ctx.fillStyle = "#6f6f9a"; ctx.fillText("余弦相似度 · 七维文风分析引擎", 40, 580);
        let link = document.createElement('a');
        link.download = `灵魂写手_${name}.png`;
        link.href = canvasCard.toDataURL();
        link.click();
    });
    
    document.getElementById('shareTextBtn').addEventListener('click', ()=>{
        if(currentResult){
            let shareMsg = `【灵魂写手检测仪】我的文风匹配度 ${currentResult.score}% 与作家“${currentResult.writer.name}”共振 ✨\n${currentResult.writer.desc}`;
            navigator.clipboard.writeText(shareMsg);
            alert("✅ 风格报告已复制，可分享至社交平台！");
        } else alert("请先进行一次分析");
    });
    
    document.querySelectorAll('.example-chip').forEach(chip=>{
        chip.addEventListener('click', ()=>{
            document.getElementById('inputText').value = chip.getAttribute('data-example');
        });
    });
    
    const backBtn = document.getElementById('backHomeBtn');
    if (backBtn) {
        backBtn.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = '/';
        });
    }
</script>
