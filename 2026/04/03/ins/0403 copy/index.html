&lt;script&gt;
    // 更新时间
    function updateTime() &#123;
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, &#39;0&#39;);
        const minutes = now.getMinutes().toString().padStart(2, &#39;0&#39;);
        document.getElementById(&#39;statusTime&#39;).textContent = `$&#123;hours&#125;:$&#123;minutes&#125;`;
    &#125;
    updateTime();
    setInterval(updateTime, 1000);

    // 输入框处理
    const inputBox = document.getElementById(&#39;inputBox&#39;);
    const sendBtn = document.getElementById(&#39;sendBtn&#39;);
    const chatContainer = document.getElementById(&#39;chatContainer&#39;);
    const featurePanel = document.getElementById(&#39;featurePanel&#39;);
    const scrollBottomBtn = document.getElementById(&#39;scrollBottom&#39;);

    inputBox.addEventListener(&#39;input&#39;, function() &#123;
        if (this.textContent.trim().length &gt; 0) &#123;
            sendBtn.classList.add(&#39;show&#39;);
        &#125; else &#123;
            sendBtn.classList.remove(&#39;show&#39;);
        &#125;
    &#125;);

    inputBox.addEventListener(&#39;keydown&#39;, function(e) &#123;
        if (e.key === &#39;Enter&#39; &amp;&amp; !e.shiftKey) &#123;
            e.preventDefault();
            sendMessage();
        &#125;
    &#125;);

    // 发送消息
    function sendMessage() &#123;
        const text = inputBox.textContent.trim();
        if (!text) return;

        const timeDiv = document.createElement(&#39;div&#39;);
        timeDiv.className = &#39;time-divider&#39;;
        timeDiv.textContent = &#39;刚刚&#39;;

        const messageRow = document.createElement(&#39;div&#39;);
        messageRow.className = &#39;message-row sent&#39;;
        messageRow.innerHTML = `
            &lt;div class=&quot;avatar&quot;&gt;
                &lt;img src=&quot;https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka&quot; alt=&quot;avatar&quot;&gt;
            &lt;/div&gt;
            &lt;div class=&quot;message-content&quot;&gt;
                &lt;div class=&quot;bubble&quot;&gt;$&#123;escapeHtml(text)&#125;&lt;/div&gt;
                &lt;div class=&quot;read-status&quot;&gt;已读&lt;/div&gt;
            &lt;/div&gt;
        `;

        // 添加长按菜单
        messageRow.addEventListener(&#39;contextmenu&#39;, function(e) &#123;
            e.preventDefault();
            showContextMenu(e, messageRow);
        &#125;);

        // 移动端长按
        let pressTimer;
        messageRow.addEventListener(&#39;touchstart&#39;, function(e) &#123;
            pressTimer = setTimeout(() =&gt; &#123;
                showContextMenu(e.touches[0], messageRow);
            &#125;, 500);
        &#125;);
        messageRow.addEventListener(&#39;touchend&#39;, function() &#123;
            clearTimeout(pressTimer);
        &#125;);

        chatContainer.appendChild(timeDiv);
        chatContainer.appendChild(messageRow);
        
        inputBox.textContent = &#39;&#39;;
        sendBtn.classList.remove(&#39;show&#39;);
        scrollToBottom();

        // 模拟对方回复
        setTimeout(() =&gt; &#123;
            receiveMessage(&#39;收到！&#39; + text);
        &#125;, 1000);
    &#125;

    // 接收消息
    function receiveMessage(text) &#123;
        const messageRow = document.createElement(&#39;div&#39;);
        messageRow.className = &#39;message-row received&#39;;
        messageRow.innerHTML = `
            &lt;div class=&quot;avatar&quot;&gt;
                &lt;img src=&quot;https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&quot; alt=&quot;avatar&quot;&gt;
            &lt;/div&gt;
            &lt;div class=&quot;message-content&quot;&gt;
                &lt;div class=&quot;nickname&quot;&gt;文件传输助手&lt;/div&gt;
                &lt;div class=&quot;bubble&quot;&gt;$&#123;escapeHtml(text)&#125;&lt;/div&gt;
            &lt;/div&gt;
        `;
        chatContainer.appendChild(messageRow);
        scrollToBottom();
        
        // 显示新消息提示
        if (!isNearBottom()) &#123;
            scrollBottomBtn.classList.add(&#39;show&#39;, &#39;unread&#39;);
        &#125;
    &#125;

    // 工具函数
    function escapeHtml(text) &#123;
        const div = document.createElement(&#39;div&#39;);
        div.textContent = text;
        return div.innerHTML;
    &#125;

    function scrollToBottom() &#123;
        chatContainer.scrollTop = chatContainer.scrollHeight;
        scrollBottomBtn.classList.remove(&#39;show&#39;, &#39;unread&#39;);
    &#125;

    function isNearBottom() &#123;
        return chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight &lt; 100;
    &#125;

    // 监听滚动
    chatContainer.addEventListener(&#39;scroll&#39;, function() &#123;
        if (isNearBottom()) &#123;
            scrollBottomBtn.classList.remove(&#39;show&#39;);
        &#125;
    &#125;);

    // 切换功能面板
    function toggleMore() &#123;
        featurePanel.classList.toggle(&#39;show&#39;);
        if (featurePanel.classList.contains(&#39;show&#39;)) &#123;
            inputBox.blur();
        &#125;
    &#125;

    function toggleEmoji() &#123;
        // 简化处理，实际应显示表情面板
        inputBox.focus();
    &#125;

    function toggleVoice() &#123;
        // 简化处理
        alert(&#39;按住说话功能&#39;);
    &#125;

    // 语音播放
    function playVoice(element) &#123;
        element.style.opacity = &#39;0.7&#39;;
        setTimeout(() =&gt; &#123;
            element.style.opacity = &#39;1&#39;;
        &#125;, 1000);
    &#125;

    // 图片预览
    function previewImage(element) &#123;
        const img = element.querySelector(&#39;img&#39;);
        const preview = document.getElementById(&#39;imagePreview&#39;);
        const previewImg = document.getElementById(&#39;previewImg&#39;);
        previewImg.src = img.src;
        preview.classList.add(&#39;show&#39;);
    &#125;

    function closePreview() &#123;
        document.getElementById(&#39;imagePreview&#39;).classList.remove(&#39;show&#39;);
    &#125;

    // 长按菜单
    let currentMessage = null;
    const contextMenu = document.getElementById(&#39;contextMenu&#39;);

    function showContextMenu(e, messageRow) &#123;
        currentMessage = messageRow;
        contextMenu.style.left = e.pageX + &#39;px&#39;;
        contextMenu.style.top = e.pageY + &#39;px&#39;;
        contextMenu.classList.add(&#39;show&#39;);
    &#125;

    document.addEventListener(&#39;click&#39;, function() &#123;
        contextMenu.classList.remove(&#39;show&#39;);
    &#125;);

    function copyMessage() &#123;
        if (currentMessage) &#123;
            const text = currentMessage.querySelector(&#39;.bubble&#39;).textContent;
            navigator.clipboard.writeText(text);
            alert(&#39;已复制&#39;);
        &#125;
    &#125;

    function recallMessage() &#123;
        if (currentMessage) &#123;
            currentMessage.style.opacity = &#39;0.5&#39;;
