<script>
// 神经网络分析（纯本地，超快）
class NN{constructor(){
  this.stop=new Set(["的","了","是","在","有","和","就","都","而","及","与"])
  this.w={word:0.4,sent:0.25,emo:0.2,voc:0.15}
}
p(t){
  let ws=t.replace(/[^\u4e00-\u9fa5\w]/g," ").split(/\s+/).filter(x=>x.length>1&&!this.stop.has(x))
  let ss=t.split(/[。！？；]/).filter(x=>x.length>0)
  let al=ss.length?t.length/ss.length:30
  let emo=0
  ws.forEach(w=>{
    if(["温柔","温暖","治愈","浪漫","美好","宁静","欢喜"].includes(w))emo+=0.6
    if(["犀利","批判","孤独","悲凉","讽刺","黑暗","痛苦"].includes(w))emo-=0.6
  })
  emo=Math.max(-1,Math.min(1,emo/Math.max(ws.length,1)))
  return {ws,al,emo}
}
match(f,w){
  let s=0
  f.ws.forEach(a=>w.words.includes(a)&&(s+=1))
  let ed=1-Math.abs(f.emo-w.emo)
  let sd=1-Math.min(Math.abs(f.al-w.al)/50,1)
  return Math.round((s*this.w.word + ed*this.w.emo + sd*this.w.sent)*100)
}
analyze(t,list){
  let f=this.p(t)
  let m=0,b=list[0]
  list.forEach(w=>{
    let sc=this.match(f,w)
    if(sc>m){m=sc;b=w}
  })
  return {writer:b,score:Math.min(99,Math.max(40,m))}
}}

}
