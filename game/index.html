  const t = text.toLowerCase();
  let maxScore = 0;
  let bestMatch = writers[0];

  writers.forEach(w => {
    let score = 0;
    w.keywords.forEach(k => {
      if (t.includes(k)) score += 1.5;
    });
    if (score > maxScore) {
      maxScore = score;
      bestMatch = w;
    }
  });

  // 如果没匹配到关键词，随机选一个气质好的
  return maxScore === 0 ? writers[Math.floor(Math.random() * 6)] : bestMatch;
}

function displayResult(w) {
  document.getElementById('writerName').innerText = w.name;
  document.getElementById('writerDesc').innerText = w.desc;
  document.getElementById('writerTags').innerHTML = w.tags.map(tag => `<span class="tag-item">${tag}</span>`).join('');
}

// 保存图片
async function saveCard() {
  const card = document.getElementById('result');
  const canvas = await html2canvas(card, { 
    backgroundColor: null, 
    scale: 2,
    useCORS: true
  });
  const link = document.createElement('a');
  link.download = '文风鉴定结果.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function shareResult() {
  alert("卡片已准备好！点击保存图片后，可分享到朋友圈、小红书或微博。");
}
