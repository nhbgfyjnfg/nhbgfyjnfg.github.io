<script>
// 神经网络文风分析（纯本地，超快）
class StyleNN {
  constructor() {
    this.stopWords = new Set(["的","了","是","在","有","和","就","都","而","及","与","也","还"])
    this.weights = { word:0.4, emo:0.3, sent:0.3 }
  }

  pre(text) {
    let words = text.replace(/[^\u4e00-\u9fa5a-zA-Z]/g, " ")
      .split(/\s+/)
      .filter(w => w.length > 1 && !this.stopWords.has(w))
    
    let sentences = text.split(/[。！？；]/).filter(s => s.length > 0)
    let avgLen = sentences.length ? text.length / sentences.length : 30
    let emo = 0

    words.forEach(w => {
      if(["温柔","温暖","治愈","浪漫","美好","宁静","欢喜","烟火","诗意"].includes(w)) emo += 0.7
      if(["犀利","批判","孤独","悲凉","讽刺","黑暗","痛苦","冷峻","清醒"].includes(w)) emo -= 0.7
    })
    emo = Math.max(-1, Math.min(1, emo / Math.max(words.length, 1)))
    return { words, avgLen, emo }
  }

  match(feature, writer) {
    let wordScore = feature.words.filter(w => writer.words.includes(w)).length * this.weights.word
    let emoScore = (1 - Math.abs(feature.emo - writer.emo)) * this.weights.emo
    let lenScore = (1 - Math.min(Math.abs(feature.avgLen - writer.avgLen) / 40, 1)) * this.weights.sent
    return Math.round((wordScore + emoScore + lenScore) * 100)
  }

  analyze(text, list) {
    let f = this.pre(text)
    let max = 0, best = list[0]
    list.forEach(w => {
      let s = this.match(f, w)
      if (s > max) { max = s; best = w }
    })
    return { writer: best, score: Math.min(99, Math.max(45, max)) }
  }
}

const nn = new StyleNN()

// 随机背景
function setRandomBg() {
  const num = Math.floor(Math.random() * 200)
  document.getElementById("randomBg").style.backgroundImage = `url('https://picsum.photos/1920/1080?random=${num}')`
}

// 分析
function startAnalyze() {
  const text = document.getElementById("inputText").value.trim()
  if (!text) { alert("请输入文字"); return }

  document.getElementById("loading").style.display = "block"
  document.getElementById("result").style.display = "none"

  setTimeout(() => {
    const res = nn.analyze(text, writers)
    document.getElementById("matchScore").innerText = `匹配度：${res.score}%`
    document.getElementById("writerName").innerText = res.writer.name
    document.getElementById("tagGroup").innerHTML = res.writer.tags.map(t => `<span class='tag'>${t}</span>`).join('')
    document.getElementById("resultDesc").innerText = res.writer.desc

    document.getElementById("loading").style.display = "none"
    document.getElementById("result").style.display = "block"
  }, 800)
}

// 重置
function resetTest() {
  document.getElementById("result").style.display = "none"
  document.getElementById("inputText").value = ""
  document.getElementById("inputText").focus()
}

// 初始化
window.onload = setRandomBg
